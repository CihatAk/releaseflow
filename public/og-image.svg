<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0f172a"/>
  
  <!-- Background pattern -->
  <circle cx="100" cy="100" r="200" fill="#3b82f6" fill-opacity="0.1"/>
  <circle cx="1100" cy="530" r="300" fill="#8b5cf6" fill-opacity="0.1"/>
  
  <!-- Logo -->
  <rect x="100" y="150" width="60" height="60" rx="12" fill="#3b82f6"/>
  <path d="M130 165L100 180L130 195L160 180L130 165Z" stroke="white" stroke-width="2"/>
  <path d="M100 195L130 210L160 195" stroke="white" stroke-width="2"/>
  <path d="M100 180L130 195L160 180" stroke="white" stroke-width="2"/>
  
  <!-- Text -->
  <text x="180" y="195" font-family="system-ui, sans-serif" font-size="48" font-weight="bold" fill="white">ReleaseFlow</text>
  
  <!-- Subtitle -->
  <text x="100" y="280" font-family="system-ui, sans-serif" font-size="32" fill="#94a3b8">
    Generate Changelogs from GitHub Commits
  </text>
  
  <!-- Terminal preview -->
  <rect x="100" y="330" width="600" height="200" rx="12" fill="#1e293b"/>
  
  <!-- Terminal header -->
  <circle cx="130" cy="355" r="8" fill="#ef4444"/>
  <circle cx="160" cy="355" r="8" fill="#eab308"/>
  <circle cx="190" cy="355" r="8" fill="#22c55e"/>
  
  <!-- Code lines -->
  <text x="130" y="400" font-family="monospace" font-size="16" fill="#22c55e">$ Connect: my-repo</text>
  <text x="130" y="430" font-family="monospace" font-size="16" fill="#64748b">✓ Found 47 commits</text>
  <text x="130" y="460" font-family="monospace" font-size="16" fill="#8b5cf6">### 🚀 Features</text>
  <text x="130" y="490" font-family="monospace" font-size="16" fill="#94a3b8">• Add OAuth login</text>
  <text x="130" y="520" font-family="monospace" font-size="16" fill="#22c55e">✓ Generated in 2.3s</text>
  
  <!-- Stats -->
  <rect x="750" y="330" width="350" height="200" rx="12" fill="#1e293b"/>
  <text x="925" y="380" font-family="system-ui" font-size="48" font-weight="bold" fill="#3b82f6" text-anchor="middle">500+</text>
  <text x="925" y="420" font-family="system-ui" font-size="20" fill="#94a3b8" text-anchor="middle">Developers</text>
  <text x="925" y="470" font-family="system-ui" font-size="48" font-weight="bold" fill="#22c55e" text-anchor="middle">3 sec</text>
  <text x="925" y="510" font-family="system-ui" font-size="20" fill="#94a3b8" text-anchor="middle">Avg. Generation</text>
</svg>